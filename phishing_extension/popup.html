<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 280px; 
      padding: 15px; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      text-align: left; 
      margin: 0;
    }
    h3 { 
      text-align: center; 
      margin-top: 0; 
      color: #333; 
      border-bottom: 1px solid #eee; 
      padding-bottom: 10px; 
    }
    .url-display { 
      font-size: 11px; 
      word-wrap: break-word; 
      color: #0056b3; 
      margin-bottom: 15px; 
      text-align: center;
      background-color: #f8f9fa;
      padding: 5px;
      border-radius: 4px;
    }
    #verdict-container { 
      text-align: center; 
      margin: 15px 0; 
      padding: 12px; 
      border-radius: 6px; 
      font-weight: bold; 
      font-size: 16px; 
      letter-spacing: 1px;
    }
    .safe { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .phish { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .loading { background-color: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }
    
    /* Stats Table Styling */
    .metric { 
      margin-bottom: 8px; 
      font-size: 13px; 
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dashed #eee;
      padding-bottom: 4px;
    }
    .label { color: #555; font-weight: 600; }
    .value { color: #222; font-family: monospace; font-size: 14px;}
  </style>
</head>
<body>
  <h3>PhishGuard Lexical</h3>
  
  <div class="url-display" id="url">Fetching URL...</div>
  
  <div id="verdict-container" class="loading">
    <span id="verdict">Analyzing...</span>
  </div>
  
  <div class="metric">
    <span class="label">Risk Score:</span>
    <span class="value" id="risk-score">-- / 100</span>
  </div>
  <div class="metric">
    <span class="label">Model Confidence:</span>
    <span class="value" id="confidence">-- %</span>
  </div>
  <div class="metric">
    <span class="label">Is Phishing:</span>
    <span class="value" id="is-phishing">--</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
